<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="VR Fusional Vergence — Patient View for Cardboard VR">
  <title>VR Patient View</title>
  <link rel="stylesheet" href="vr.css">
</head>

<body>

  <!-- Connection Overlay -->
  <div class="connect-overlay" id="connectOverlay">
    <div class="connect-card">
      <div class="connect-icon">🥽</div>
      <h1>VR Patient View</h1>
      <p>Enter this code on the Controller phone to connect:</p>
      <div class="code-container">
        <div class="room-code" id="roomCode">------</div>
        <button class="btn-copy" id="btnCopy" title="Copy Code">📋</button>
      </div>
      <div class="connect-status" id="connectStatus">
        <span class="status-dot waiting"></span>
        Waiting for controller...
      </div>
    </div>
  </div>

  <!-- VR Split Screen -->
  <div class="vr-container" id="vrContainer">
    <!-- Left Eye (Horizontal Line) -->
    <div class="eye-view" id="leftEye">
      <div class="eye-content" id="leftContent">
        <div class="h-line-left" id="hLineLeft"></div>
        <div class="center-dot" id="dotLeft"></div>
        <div class="h-line-right" id="hLineRight"></div>
      </div>
    </div>

    <!-- Center Divider -->
    <div class="vr-divider"></div>

    <!-- Right Eye (Vertical Line) -->
    <div class="eye-view" id="rightEye">
      <div class="eye-content" id="rightContent">
        <div class="v-line-top" id="vLineTop"></div>
        <div class="center-dot" id="dotRight"></div>
        <div class="v-line-bottom" id="vLineBottom"></div>
      </div>
    </div>
  </div>

  <!-- Tiny connection indicator -->
  <div class="conn-indicator" id="connIndicator"></div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="shared.js"></script>
  <script src="vr.js"></script>
</body>

</html>
